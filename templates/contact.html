{% extends "layout.html" %}
{% block title %}Clinical Technical Support{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-top:0;">Clinical Support & Administration Escalation</h2>
    <p style="color:var(--text-muted); font-size:13px; margin-bottom:25px;">Submit hardware synchronization discrepancies or infrastructure ticketing anomalies directly to engineering officers on duty.</p>
    
    <form action="/submit-ticket" method="post">
        <div class="form-group full">
            <label>Medical Practitioner Email</label>
            <input type="email" name="email" placeholder="e.g., resident_md@hospital.org" required>
        </div>
        <div class="form-group full">
            <label>Severity Level Classification</label>
            <select name="severity">
                <option value="low">Low - Routine Infrastructure Request</option>
                <option value="medium">Medium - Node Sync Discrepancy</option>
                <option value="high">High - Immediate Ward Gateway Intervention Required</option>
            </select>
        </div>
        <div class="form-group full">
            <label>Discrepancy Log Summary</label>
            <textarea name="message" rows="5" placeholder="Elaborate structural error codes or network hardware parameters..." required></textarea>
        </div>
        <button type="submit">Transmit Support Ticket</button>
    </form>
</div>
{% endblock %}
